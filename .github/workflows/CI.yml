name: CI

on:
  push:
  pull_request:
    branches:
      - main
    tags: '*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# Cancel redundant CI tests automatically
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
      
jobs:
  run_tests:
    name: Julia ${{ matrix.version }} - ${{ matrix.os }} - ${{ matrix.arch }} - ${{ github.event_name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        version:
          - '1'
          - '1.11'
          - 'lts'
          #- 'nightly'
        os:
          - ubuntu-latest
          - macOS-15-intel        # with intel processors 
          - windows-latest
        arch:
          - x64
        include:
          - os: macOS-latest
            arch: aarch64
            version: '1.10'
          - os: macOS-latest
            arch: aarch64
            version: '1.11'
          #- os: macOS-latest
          #  arch: aarch64
          #  version: 'nightly'
    steps:
      - uses: actions/checkout@v6
      - uses: julia-actions/setup-julia@v3
        with:
          version: ${{ matrix.version }}
          arch: ${{ matrix.arch }}
      - uses: actions/cache@v5
        env:
          cache-name: cache-artifacts
        with:
          path: ~/.julia/artifacts
          key: ${{ runner.os }}-test-${{ env.cache-name }}-${{ hashFiles('**/Project.toml') }}
          restore-keys: |
            ${{ runner.os }}-test-${{ env.cache-name }}-
            ${{ runner.os }}-test-
            ${{ runner.os }}-
      - name: Copy 7z into Julia libexec on Windows (GR build.jl hardcodes this path, removed in Julia 1.12)
        if: runner.os == 'Windows'
        run: |
          $juliabin = (Get-Command julia).Source
          $libexec = Join-Path (Split-Path (Split-Path $juliabin -Parent) -Parent) "libexec"
          New-Item -ItemType Directory -Force -Path $libexec | Out-Null
          Copy-Item "C:\Program Files\7-Zip\7z.exe" "$libexec\7z.exe"
      - uses: julia-actions/julia-buildpkg@latest
      - name: Remove macOS quarantine from Julia artifacts
        if: runner.os == 'macOS'
        run: xattr -r -d com.apple.quarantine ~/.julia/artifacts/ || true
      - uses: julia-actions/julia-runtest@latest
